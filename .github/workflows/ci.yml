name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25.1"
  REGISTRY: ghcr.io

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Build auth service
        run: go build -v ./services/auth/cmd/auth

      - name: Build tasks service
        run: go build -v ./services/tasks/cmd/tasks

  docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: prep
        shell: bash
        run: |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          REPO_NAME="$(basename "${GITHUB_REPOSITORY}")"
          REPO_LC="$(echo "${REPO_NAME}" | tr '[:upper:]' '[:lower:]')"
          SHORT_SHA="${GITHUB_SHA::7}"

          AUTH_IMAGE_REPO="${{ env.REGISTRY }}/${OWNER_LC}/${REPO_LC}-auth"
          TASKS_IMAGE_REPO="${{ env.REGISTRY }}/${OWNER_LC}/${REPO_LC}-tasks"

          echo "short_sha=${SHORT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "auth_image_repo=${AUTH_IMAGE_REPO}" >> "${GITHUB_OUTPUT}"
          echo "tasks_image_repo=${TASKS_IMAGE_REPO}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build auth image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./services/auth/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.prep.outputs.auth_image_repo }}:${{ steps.prep.outputs.short_sha }}
            ${{ steps.prep.outputs.auth_image_repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build tasks image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./services/tasks/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.prep.outputs.tasks_image_repo }}:${{ steps.prep.outputs.short_sha }}
            ${{ steps.prep.outputs.tasks_image_repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max